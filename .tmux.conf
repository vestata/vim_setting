set -g mouse on
#setw -g mode-keys vi

set -g history-limit 10000

# bind Ctrl + f as prefix
unbind C-b
set -g prefix C-f

set -g terminal-overrides "xterm*:smcup@:rmcup@"

# Copy to system clipboard
set -s copy-command 'xclip -i -selection clipboard'
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -i -selection clipboard"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -i -selection clipboard"

bind -n WheelUpPane if-shell -F -t = "#{alternate_on}" \
  "send-keys -M" \
  "select-pane -t =; copy-mode -e; send-keys -M"

bind -n WheelDownPane select-pane -t = \; send-keys -M

bind -n MouseDown3Pane run "xclip -o -selection clipboard | tmux load-buffer - ; tmux paste-buffer"

set -g window-status-style 'default'
set -g window-status-current-style 'default'

set -g update-environment "DISPLAY SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY"

# set new pane with same PATH as current pane
bind c new-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
